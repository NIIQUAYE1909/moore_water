<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moor Water — Secure Login</title>
  <meta name="description" content="Secure login for Moor Natural Mineral Water Daily Ledger System">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0A3894">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      background: none;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    body::before { display: none; }

    /* Animated background */
    .bg-scene {
      position: fixed;
      inset: 0;
      background: linear-gradient(145deg, #061F5C 0%, #0A3894 45%, #0E52C1 75%, #0076A8 100%);
      z-index: 0;
    }
    .bg-scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 20%, rgba(0, 181, 239, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(10, 56, 148, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 10%, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
    }

    /* Floating bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    .bubble:nth-child(1)  { width: 8px;   height: 8px;   left: 8%;   animation-duration: 9s;  animation-delay: 0s;   background: rgba(255,255,255,0.15); }
    .bubble:nth-child(2)  { width: 14px;  height: 14px;  left: 18%;  animation-duration: 12s; animation-delay: 1.5s; background: rgba(0,181,239,0.20); }
    .bubble:nth-child(3)  { width: 6px;   height: 6px;   left: 35%;  animation-duration: 8s;  animation-delay: 3s;   background: rgba(255,255,255,0.12); }
    .bubble:nth-child(4)  { width: 18px;  height: 18px;  left: 55%;  animation-duration: 14s; animation-delay: 0.5s; background: rgba(0,181,239,0.15); }
    .bubble:nth-child(5)  { width: 10px;  height: 10px;  left: 72%;  animation-duration: 10s; animation-delay: 2s;   background: rgba(255,255,255,0.10); }
    .bubble:nth-child(6)  { width: 5px;   height: 5px;   left: 85%;  animation-duration: 7s;  animation-delay: 4s;   background: rgba(0,181,239,0.18); }
    .bubble:nth-child(7)  { width: 12px;  height: 12px;  left: 92%;  animation-duration: 11s; animation-delay: 1s;   background: rgba(255,255,255,0.08); }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .login-wrap {
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 2;
      animation: slideUp 0.6s cubic-bezier(0, 0, 0.2, 1) both;
      /* Vertical centering that still allows scroll on short screens */
      margin: auto;
    }

    /* ── Short viewports: card scrolls naturally via body ── */
    @media (max-height: 680px) {
      .login-card {
        /* No max-height restriction — body overflow-y:auto handles scroll */
        overflow-y: visible;
      }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border-radius: 28px;
      padding: 36px 24px 28px;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.30),
        0 0 0 1px rgba(255, 255, 255, 0.60),
        inset 0 1px 0 rgba(255, 255, 255, 0.80);
      border: 1px solid rgba(255, 255, 255, 0.50);
    }
    @media (min-width: 480px) {
      .login-card { padding: 40px 32px 32px; }
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      text-align: center;
    }
    .login-logo svg {
      width: 86px; height: 86px;
      filter: drop-shadow(0 8px 16px rgba(10, 56, 148, 0.20));
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: logoSpin 30s linear infinite;
    }
    .login-logo:hover svg { transform: scale(1.06) rotate(3deg); animation-play-state: paused; }
    @keyframes logoSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    /* Subtle pulse on sign-in button */
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(10,56,148,0.30); }
      50%       { box-shadow: 0 8px 28px rgba(10,56,148,0.50); }
    }
    #btnSubmit:not(.loading) {
      animation: btnPulse 3s ease infinite;
    }

    .brand-title-login {
      font-size: 1.35rem;
      font-weight: 800;
      color: #0A3894;
      letter-spacing: -0.3px;
    }
    .brand-sub-login {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #5E7898;
      text-transform: uppercase;
    }

    /* Role selector */
    .role-selector {
      display: flex;
      background: #F0F5FF;
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 22px;
      gap: 5px;
      border: 1px solid #DDE6F5;
    }
    .role-btn {
      flex: 1;
      padding: 10px 8px;
      min-height: 44px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      color: #5E7898;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    .role-btn:active { transform: scale(0.96); }
    .role-btn svg { width: 15px; height: 15px; fill: currentColor; }
    .role-btn.active {
      background: white;
      color: #0A3894;
      box-shadow: 0 3px 12px rgba(10, 56, 148, 0.14);
    }
    .role-btn.active.admin-active {
      color: #92400E;
      background: #FFFBEB;
      box-shadow: 0 3px 12px rgba(180, 83, 9, 0.14);
    }

    /* Role info banner */
    .role-info {
      background: rgba(10, 56, 148, 0.06);
      border: 1px solid rgba(10, 56, 148, 0.12);
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 20px;
      font-size: 0.78rem;
      color: #334155;
      font-weight: 500;
      display: flex;
      gap: 9px;
      align-items: flex-start;
      transition: all 0.3s;
    }
    .role-info.admin-info {
      background: rgba(180, 83, 9, 0.06);
      border-color: rgba(180, 83, 9, 0.18);
      color: #78350F;
    }
    .role-info svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; margin-top: 1px; }

    /* Error box */
    #loginError {
      color: #B91C1C;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(220, 38, 38, 0.07);
      border-radius: 10px;
      border: 1px solid rgba(220, 38, 38, 0.18);
      display: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 18px;
      color: #C4D2E8;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #DDE6F5;
    }

    .security-note {
      text-align: center;
      font-size: 0.69rem;
      color: #94A3B8;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .security-note svg { width: 11px; height: 11px; fill: #94A3B8; }

    /* Animated loading spinner on button */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .btn-primary.loading .spinner { display: inline-block; }
    .btn-primary.loading .btn-text { display: none; }

    /* Ensure 16px on mobile to prevent iOS auto-zoom */
    input, select { font-size: 16px !important; }
    @media (min-width: 768px) {
      input, select { font-size: 0.93rem !important; }
    }

    .footer-outer {
      text-align: center;
      margin-top: 22px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.7rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-scene"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo & Brand -->
      <div class="login-logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path id="circlePathLogin" d="M 50 14 A 36 36 0 1 1 49.9 14" fill="none"/>
          <text fill="#E30613" font-size="8.8" font-weight="900" letter-spacing="4.5">
            <textPath href="#circlePathLogin" startOffset="0%">• MOOR • MOOR • MOOR • MOOR </textPath>
          </text>
          <circle cx="50" cy="53" r="23" fill="none" stroke="#00B5EF" stroke-width="1.5" opacity="0.4"/>
          <path d="M 50 67 C 32 67, 26 50, 41 48 C 40 57, 45 63, 50 67 Z" fill="#00B5EF"/>
          <path d="M 50 67 C 68 67, 74 50, 59 48 C 60 57, 55 63, 50 67 Z" fill="#0A3894"/>
          <path d="M 50 25 C 62 42, 65 58, 50 67 C 35 58, 38 42, 50 25 Z" fill="url(#dropletGradLogin)"/>
          <defs>
            <linearGradient id="dropletGradLogin" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#00B5EF"/>
              <stop offset="100%" stop-color="#0A3894"/>
            </linearGradient>
          </defs>
        </svg>
        <div>
          <div class="brand-title-login">Moor Natural Mineral Water</div>
          <div class="brand-sub-login">Daily Ledger System</div>
        </div>
      </div>

      <!-- Role Selector -->
      <div class="role-selector">
        <button class="role-btn active" id="btnRoleEmployee" onclick="setRole('employee')">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Employee Login
        </button>
        <button class="role-btn" id="btnRoleAdmin" onclick="setRole('admin')">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
          Admin Login
        </button>
      </div>

      <!-- Role Context Banner -->
      <div class="role-info" id="roleInfoBanner">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        <span id="roleInfoText">Enter your employee credentials to access the daily data entry form.</span>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
            </span>
            <input type="email" id="loginEmail" name="email"
                   placeholder="name@moorwater.com"
                   autocomplete="email" required>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 22px;">
          <label for="loginPassword">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </span>
            <input type="password" id="loginPassword" name="password"
                   placeholder="Enter your password"
                   autocomplete="current-password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="btnSubmit" style="padding: 14px;">
          <div class="spinner" id="btnSpinner"></div>
          <span class="btn-text" id="btnText">Sign In to Ledger</span>
        </button>

        <div id="loginError"></div>
      </form>

      <div class="divider">or</div>
      <div class="security-note">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        Secured session · Encrypted passwords · Role-based access
      </div>

      <!-- Registration Links -->
      <div style="margin-top: 18px; display: flex; flex-direction: column; gap: 9px;">
        <a href="/register" class="btn btn-secondary" style="text-decoration: none; font-size: 0.85rem;">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          New here? Create an Account
        </a>
        <a href="/preview" class="btn" style="text-decoration: none; font-size: 0.82rem; background: rgba(0,181,239,0.08); color: #0A3894; border: 1.5px solid rgba(0,181,239,0.25);">
          <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:currentColor;"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          Preview App Without Account
        </a>
      </div>
    </div>

    <div class="footer-outer">
      © 2026 Kenamos Big Brothers Ltd. · Yamfo, Ahafo Region
    </div>
  </div>

  <script>
    let currentRole = 'employee';

    function setRole(role) {
      currentRole = role;
      const empBtn   = document.getElementById('btnRoleEmployee');
      const adminBtn = document.getElementById('btnRoleAdmin');
      const banner   = document.getElementById('roleInfoBanner');
      const infoText = document.getElementById('roleInfoText');
      const emailInput = document.getElementById('loginEmail');

      if (role === 'admin') {
        empBtn.classList.remove('active');
        adminBtn.classList.add('active', 'admin-active');
        banner.classList.add('admin-info');
        infoText.textContent = 'Admin login grants access to the Admin Dashboard — Employee Directory, Master Ledger, and Export tools.';
        emailInput.placeholder = 'admin@moorwater.com';
      } else {
        adminBtn.classList.remove('active', 'admin-active');
        empBtn.classList.add('active');
        banner.classList.remove('admin-info');
        infoText.textContent = 'Enter your employee credentials to access the daily data entry form.';
        emailInput.placeholder = 'name@moorwater.com';
      }
      document.getElementById('loginError').style.display = 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email     = document.getElementById('loginEmail').value.trim();
      const password  = document.getElementById('loginPassword').value;
      const btnSubmit = document.getElementById('btnSubmit');
      const errDiv    = document.getElementById('loginError');

      if (!email || !password) { showError('Please enter both email and password.'); return; }

      btnSubmit.classList.add('loading');
      btnSubmit.disabled = true;
      errDiv.style.display = 'none';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();

        if (response.ok) {
          window.location.href = data.role === 'admin' ? '/admin' : '/';
        } else if (response.status === 429) {
          showError(data.error || 'Too many failed attempts. Please wait 5 minutes.');
          btnSubmit.classList.remove('loading');
          btnSubmit.disabled = false;
        } else {
          showError(data.error || 'Invalid credentials. Please try again.');
          btnSubmit.classList.remove('loading');
          btnSubmit.disabled = false;
        }
      } catch (err) {
        showError('Network error. Check your connection and try again.');
        btnSubmit.classList.remove('loading');
        btnSubmit.disabled = false;
      }
    });

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
