<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <!-- Solid deep indigo background for the icon container -->
  <rect width="100%" height="100%" fill="#0B2E6B"/>
  
  <!-- Outer ring in teal current -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#0DAFC4" stroke-width="2" opacity="0.4"/>
  
  <!-- Logo group shifted slightly to center visually -->
  <g transform="translate(0, -3)">
    <!-- Text Path definition -->
    <path id="circlePathIcon" d="M 50 16 A 34 34 0 1 1 49.9 16" fill="none" />
    <text fill="#EDA13C" font-size="8" font-weight="900" letter-spacing="4">
      <textPath href="#circlePathIcon" startOffset="0%">• MOOR • MOOR • MOOR • MOOR </textPath>
    </text>
    
    <!-- Outer circular frame of drop -->
    <circle cx="50" cy="53" r="23" fill="none" stroke="#0DAFC4" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Left leaf/petal in teal -->
    <path d="M 50 67 C 32 67, 26 50, 41 48 C 40 57, 45 63, 50 67 Z" fill="#0DAFC4" />
    <!-- Right leaf/petal in white -->
    <path d="M 50 67 C 68 67, 74 50, 59 48 C 60 57, 55 63, 50 67 Z" fill="#ffffff" opacity="0.9" />
    <!-- Central Water Droplet -->
    <path d="M 50 25 C 62 42, 65 58, 50 67 C 35 58, 38 42, 50 25 Z" fill="url(#dropletGradIcon)" />
  </g>
  
  <defs>
    <linearGradient id="dropletGradIcon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0DAFC4" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>
</svg>
